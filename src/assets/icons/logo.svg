  </g>
  <!-- Small sparkle accents -->
  <g fill="white" opacity="0.6" transform="translate(82, 32)">
    <path d="M4,0 L5,3 L8,4 L5,5 L4,8 L3,5 L0,4 L3,3 Z"/>
  </g>
  <g fill="white" opacity="0.4" transform="translate(38, 28)">
    <path d="M3,0 L3.8,2.2 L6,3 L3.8,3.8 L3,6 L2.2,3.8 L0,3 L2.2,2.2 Z"/>
  </g>
</svg>