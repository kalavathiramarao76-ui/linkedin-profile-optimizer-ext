<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Person silhouette -->
  <g fill="white">
    <!-- Head -->
    <circle cx="64" cy="48" r="16"/>
    <!-- Body/shoulders -->
    <path d="M34,100 C34,80 44,72 64,72 C84,72 94,80 94,100 L94,104 L34,104 Z"/>
  </g>
  <!-- Star/sparkle above head -->
  <g fill="white" transform="translate(56, 14)">
